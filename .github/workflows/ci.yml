# =============================================================================
# ci.yml — Smart Campus Operations Hub
# GitHub Actions CI Workflow
#
# Triggers on push and PR to: main, develop, and all feature branches
# Jobs:
#   1. backend  — builds and tests the Spring Boot API
#   2. frontend — builds the React client app
#
# Notes:
#   - Backend job is skipped if pom.xml doesn't exist yet
#   - Frontend job is skipped if package.json doesn't exist yet
#   - This prevents CI failures during early scaffold phase
# =============================================================================

name: Smart Campus CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Backend (Spring Boot)
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    # PostgreSQL service container for integration tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: smartcampus_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Step 1 — Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Check if pom.xml exists before running
      # Skips the job gracefully if backend isn't scaffolded yet
      - name: Check if backend exists
        id: check_backend
        run: |
          if [ -f "backend/pom.xml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ backend/pom.xml not found — skipping backend job"
          fi

      # Step 3 — Set up Java 17 Temurin
      - name: Set up Java 17 (Temurin)
        if: steps.check_backend.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 4 — Build and test with Maven
      - name: Build and test with Maven
        if: steps.check_backend.outputs.exists == 'true'
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/smartcampus_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: test-secret-key-for-ci-only-minimum-32-characters-long
        run: mvn clean verify -B

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Frontend (React + Vite)
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Check if package.json exists before running
      # Skips the job gracefully if frontend isn't scaffolded yet
      - name: Check if frontend exists
        id: check_frontend
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ frontend/package.json not found — skipping frontend job"
          fi

      # Step 3 — Set up Node.js 20
      - name: Set up Node.js 20
        if: steps.check_frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Step 4 — Install dependencies
      - name: Install dependencies
        if: steps.check_frontend.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      # Step 5 — Build the React app
      - name: Build React app
        if: steps.check_frontend.outputs.exists == 'true'
        working-directory: frontend
        run: npm run build
```

---

## What This Fixed Version Does Differently
```
OLD ci.yml:
→ Assumes pom.xml always exists         ❌
→ Assumes package.json always exists    ❌
→ Crashes when either is missing        ❌

NEW ci.yml:
→ Checks if pom.xml exists first        ✅
→ Checks if package.json exists first   ✅
→ Skips gracefully if not found         ✅
→ Runs fully when files exist           ✅
→ PostgreSQL service for tests          ✅
→ JWT_SECRET env variable for CI        ✅
```

