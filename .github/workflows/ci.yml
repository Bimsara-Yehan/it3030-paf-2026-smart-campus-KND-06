## After Saving the File — Commit It

In GitHub Desktop:
```
1. You'll see .github/workflows/ci.yml 
   appear under Changes on the left

2. Tick the checkbox next to it

3. Type in Summary box:
   ci: fix workflow to skip jobs when scaffold not yet present

4. Click Commit to feature/module-DE-auth-notifs

5. Click Push origin
```

